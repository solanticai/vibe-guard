name: Bug Report
description: Report a bug in VibeCheck
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      value: |
        1. Run `vibecheck ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened

  - type: input
    id: version
    attributes:
      label: VibeCheck Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "20.x"

  - type: dropdown
    id: agent
    attributes:
      label: AI Agent
      options:
        - Claude Code
        - Cursor
        - Codex
        - OpenCode
        - N/A (CLI only)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: VibeCheck Config
      description: Paste your vibecheck.config.ts (remove any secrets)
      render: typescript

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any error messages or relevant log output
      render: shell
