name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for VibeCheck? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's frustrating today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Rule Engine
        - Config System
        - Adapter (Claude Code)
        - Adapter (Cursor)
        - Adapter (Codex/OpenCode)
        - Convention Learning
        - Quality Dashboard
        - Plugin System
        - Documentation
        - Other
    validations:
      required: true
